<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мастера - Mini ERP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>👷 Мастера</h1>
        <nav class="breadcrumb">
            <a href="index.html">← Главная</a>
        </nav>
    </header>

    <main class="content">
        <section class="form-section">
            <h2>Добавить нового мастера</h2>
            <form action="/api/v1/technicians" method="POST" class="form">
                <div class="form-group">
                    <label for="fullName">ФИО:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>

                <div class="form-group">
                    <label for="specialization">Специализация:</label>
                    <input type="text" id="specialization" name="specialization" required>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="isActive" name="isActive" value="true" checked>
                        Активен
                    </label>
                </div>

                <button type="submit" class="btn-primary">Добавить мастера</button>
            </form>
        </section>

        <section class="info-section">
            <h3>📋 Просмотр мастеров</h3>
            <p>Список всех мастеров в формате JSON:</p>
            <a href="/api/v1/technicians" target="_blank" class="btn-secondary">Открыть список мастеров</a>
        </section>
    </main>
</div>
</body>
</html>
