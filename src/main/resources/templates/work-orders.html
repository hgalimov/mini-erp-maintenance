<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наряд-заказы - Mini ERP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header>
        <h1>📋 Наряд-заказы</h1>
        <nav class="breadcrumb">
            <a href="index.html">← Главная</a>
        </nav>
    </header>

    <main class="content">
        <section class="form-section">
            <h2>Создать наряд-заказ</h2>
            <form action="/api/v1/work-orders" method="POST" class="form">
                <div class="form-group">
                    <label for="equipmentId">ID оборудования:</label>
                    <input type="number" id="equipmentId" name="equipmentId" required min="1">
                    <small>Укажите ID оборудования из списка</small>
                </div>

                <div class="form-group">
                    <label for="technicianId">ID мастера:</label>
                    <input type="number" id="technicianId" name="technicianId" required min="1">
                    <small>Укажите ID мастера из списка</small>
                </div>

                <div class="form-group">
                    <label for="description">Описание работ:</label>
                    <textarea id="description" name="description" required rows="4"></textarea>
                </div>

                <button type="submit" class="btn-primary">Создать наряд-заказ</button>
            </form>
        </section>

        <section class="info-section">
            <h3>📋 Просмотр наряд-заказов</h3>
            <p>Список всех наряд-заказов в формате JSON:</p>
            <a href="/api/v1/work-orders" target="_blank" class="btn-secondary">Открыть список наряд-заказов</a>

            <h4>Фильтры по статусу:</h4>
            <div class="filter-links">
                <a href="/api/v1/work-orders?status=CREATED" target="_blank">Созданные</a>
                <a href="/api/v1/work-orders?status=IN_PROGRESS" target="_blank">В работе</a>
                <a href="/api/v1/work-orders?status=COMPLETED" target="_blank">Завершённые</a>
                <a href="/api/v1/work-orders?status=CANCELLED" target="_blank">Отменённые</a>
            </div>
        </section>
    </main>
</div>
</body>
</html>
