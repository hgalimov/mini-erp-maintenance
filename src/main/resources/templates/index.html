<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mini ERP - Главная</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <header>
        <h1>🔧 Mini ERP: Техобслуживание и ремонт</h1>
        <p>Система управления оборудованием и ремонтами</p>
    </header>
    <main>
        <div class="menu-grid">
            <a th:href="@{/web/equipment}" class="menu-card">
                <div class="menu-icon">⚙️</div>
                <h2>Оборудование</h2>
                <p>Управление станками и оборудованием</p>
            </a>
            <a th:href="@{/web/technicians}" class="menu-card">
                <div class="menu-icon">👷</div>
                <h2>Мастера</h2>
                <p>Специалисты по ремонту</p>
            </a>
            <a th:href="@{/web/work-orders}" class="menu-card">
                <div class="menu-icon">📋</div>
                <h2>Наряд-заказы</h2>
                <p>Заявки на обслуживание</p>
            </a>
        </div>
    </main>
</div>
</body>
</html>
