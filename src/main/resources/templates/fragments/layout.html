<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">Mini ERP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}"><i class="bi bi-gear-wide-connected"></i> Mini ERP</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" th:href="@{/equipment}"><i class="bi bi-cpu"></i> Equipment</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/technicians}"><i class="bi bi-people"></i> Technicians</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/work-orders}"><i class="bi bi-clipboard-check"></i> Work Orders</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/h2-console}" target="_blank"><i class="bi bi-database"></i> H2 Console</a></li>
            </ul>
        </div>
    </div>
</nav>

<div th:fragment="alerts">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<footer th:fragment="footer" class="text-center text-muted py-4 mt-5 border-top">
    <small>Mini ERP Maintenance &copy; 2026 · Spring Boot + Thymeleaf + Kotlin</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
